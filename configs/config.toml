# Aboltabolyzer — routed Gemma/Qwen verifier
#
# Machine switch (only knob you need for GPU size):
#   [runtime] hardware_profile = "16gb" | "8gb"
#
# Then every `just` recipe uses that profile via resolve_section():
#   just show-profile   # confirm resolved model / RAG / memory
#   just setup          # downloads the profile's verifier + builds RAG
#   just run            # preprocess → predict
#   just first-run      # setup → preprocess → predict

[runtime]
hardware_profile = "8gb"          # ← set this once per machine ("16gb" | "8gb")
float32_matmul_precision = "high"
allow_tf32 = true

[predict]
use_checkpoints = true
force_recompute = false
partial_flush_seconds = 60
llm_predictions_path = "generated/processed/test_llm_preds.csv"

[data]
sample_path = "dataset/sample_dataset.json"
test_path = "dataset/testset_audit_200.csv"
processed_dir = "generated/processed"
submission_output_path = "submissions/submission.csv"

[router]
enabled = true
# static | llm | hybrid — hybrid = static veto (grammar/math/calendar/idiom/literal)
# then LLM only on residual rows. llm_routing kept for backward compat.
routing_mode = "hybrid"
llm_routing = true

[decision]
threshold = 0.5

# NLI-first gate (after fast pass, before think). Asymmetric policy:
#   Hallucinated easier (lower margin); Faithful harder (higher margin + guards).
# Only configured task types with non-empty premise (context or RAG evidence).
[nli]
enabled = true
model_name = "MoritzLaurer/mDeBERTa-v3-base-xnli-multilingual-nli-2mil7"
batch_size = 16
margin = 0.35                      # legacy fallback if mf/mh unset
margin_faithful = 0.45             # |entail−contradict| for Faithful auto-accept
margin_hallucinated = 0.30         # easier contradiction → skip think
hypothesis_style = "qa_en"         # qa_en | answer_only | claim_bn | qa_bn
faithful_score = 0.90
hallucinated_score = 0.10
max_length = 512
# Faithful guards (topic-overlap / entity FPs → fall through to think)
require_faithful_overlap = true
faithful_overlap_min = 0.4
require_entail_gt_neutral = true
# NLI Faithful + fast strongly H → think (not hard “must agree” on all rows)
block_faithful_on_fast_h = true
fast_h_max_for_nli_faithful = 0.40
# Skip NLI when RAG premise similarity is weak (0 = disable this check).
min_rag_sim_for_nli = 0.55
tasks = [
    "context_grounded_fact",
    "context_grounded_other",
    "famous_bn_fact_context",
    "general_fact_null",      # uses RAG evidence as premise when present
]

[debug]
write_debug = true

# ── Shared defaults (profiles override machine-specific keys) ────────────────

[rag]
corpus_root = "corpus"
index_root = "indexes"
sources = ["wiki", "idioms", "literal", "grammar"]
exemplar_index_path = "indexes/exemplar_index.pkl"
model_name = "BAAI/bge-m3"
index_dtype = "float16"
top_k = 5
max_evidence_tokens = 512
similarity_threshold = 0.55
query_mode = "prompt"                              # "prompt" | "prompt_response"
batch_size = 32                                    # overridden per profile
query_batch_size = 32                              # overridden per profile
max_seq_length = 512

[gemma]
# Shared verifier knobs; model / VRAM / think live under [hardware_profiles.*.gemma]
offload_folder = "models/offload/gemma"
torch_dtype = "bfloat16"
bnb_4bit_compute_dtype = "bfloat16"
clear_cuda_before_load = true
think_conf_low = 0.30
think_conf_high = 0.70
# Fallback when a task is missing from max_think_tokens_by_task
max_think_tokens = 768

# Per-task think budgets — kept short for 8GB speed; raise if verdict_unparsed rises.
[gemma.max_think_tokens_by_task]
bangla_grammar = 768
general_fact_null = 640
idiom_meaning_null = 512
translation_or_bilingual = 384
literal_meaning_null = 384
context_grounded_fact = 384
context_grounded_other = 384
famous_bn_fact_null = 384
famous_bn_fact_context = 320
other_null = 384
math_work_rate = 320
math_speed_distance = 288
math_profit_loss = 288
math_average = 256
math_other = 288
calendar_arithmetic = 288

# ── Profile: 16GB (RTX 5060 Ti / P100 / T4-class) — Gemma 4 ──────────────────

[hardware_profiles.16gb.gemma]
fast_model_name = "google/gemma-4-E4B-it"
think_model_name = "google/gemma-4-E4B-it"
model_loader = "multimodal_lm"
load_in = "4bit"
device_map = "cuda:0"
cuda_max_memory = "14GiB"
cpu_max_memory = "32GiB"
max_input_tokens = 3072
enable_think_pass = true
force_think_all = false
exemplar_top_k = 3
fast_pass_batch_size = 16
think_pass_batch_size = 4

[hardware_profiles.16gb.rag]
batch_size = 128
query_batch_size = 128

# ── Profile: 8GB / small GPUs — ungated Qwen3 thinking model ─────────────────

[hardware_profiles.8gb.gemma]
think_model_name = "deepseek-ai/DeepSeek-R1-Distill-Qwen-7B"
# fast_model_name = "deepseek-ai/DeepSeek-R1-Distill-Qwen-7B"
fast_model_name = "Qwen/Qwen2.5-3B-Instruct"
# fast_model_name = "Qwen/Qwen2.5-7B-Instruct"
model_loader = "causal_lm"
load_in = "4bit"
device_map = "cuda:0"
cuda_max_memory = "7GiB"
cpu_max_memory = "16GiB"
max_input_tokens = 1536
enable_think_pass = true
force_think_all = false
exemplar_top_k = 0
chat_template_enable_thinking_fast = false
chat_template_enable_thinking_think = true
fast_pass_batch_size = 8
# Long CoT greedy can diverge under bf16 when left-padded; keep 1 on 8GB, bump on 16GB/5090
think_pass_batch_size = 1

[hardware_profiles.8gb.rag]
batch_size = 32
query_batch_size = 32
