# =============================================================================
# Aboltabolyzer — runtime configuration
# =============================================================================
# Edit this file first, then run: just first-run-8gb / just first-run-16gb
# Profile-specific blocks at the bottom override the base sections.

# Random seed for fold splits and model init reproducibility.
seed = 42

# Stratified CV folds for XLM-R training and fold-isolated Gemma OOF.
num_folds = 10

# -----------------------------------------------------------------------------
# Runtime — which machine profile and verifier mode to use
# -----------------------------------------------------------------------------
[runtime]
# Active hardware profile. Values "8gb" or "16gb" override [xlmr], [gemma],
# and [rag] with matching [hardware_profiles.*] blocks.
hardware_profile = "8gb"

# If true, training/predict abort when Gemma fails instead of faking scores.
fail_on_model_error = true

# If true, Gemma is the final verdict source (p_llm). If false, p_llm = p_xlmr
# and the pipeline skips Gemma — useful for smoke tests without loading the LLM.
use_llm_verifier = true

# Runtime performance knobs. Leave thread counts at 0 to let PyTorch choose.
torch_num_threads = 0
torch_interop_threads = 0
float32_matmul_precision = "high"
allow_tf32 = true
cuda_benchmark = false

# -----------------------------------------------------------------------------
# Prediction checkpoints — resume `just predict` after OOMs/interruptions
# -----------------------------------------------------------------------------
[predict]
# If true, prediction reuses completed stage CSVs instead of recomputing.
use_checkpoints = true

# Set true for a one-off clean prediction run without deleting checkpoint files.
force_recompute = false

# Stage-level prediction checkpoints. `test_with_evidence.csv` and the Gemma
# JSONL debug log are also resumable caches.
xlmr_predictions_path = "dataset/processed/test_xlmr_preds.csv"
llm_predictions_path = "dataset/processed/test_llm_preds.csv"

# -----------------------------------------------------------------------------
# Data paths
# -----------------------------------------------------------------------------
[data]
# Labeled training JSON (299 samples in the sample competition set).
sample_path = "dataset/sample_dataset.json"

# Test CSV with id, context, prompt_bn, response_bn (no labels).
test_path = "dataset/.3_testset.csv"

# Generated CSVs land here (train.csv, oof_xlmr.csv, train_with_preds.csv, …).
processed_dir = "dataset/processed"

# Final competition submission (id, label).
submission_output_path = "submissions/submission.csv"

# -----------------------------------------------------------------------------
# RAG — dense retrieval for rows where context == "[NULL]"
# -----------------------------------------------------------------------------
[rag]
# Directory of *.jsonl corpus files ({ "text": "..." } or { "passage": "..." }).
corpus_dir = "corpus"

# Pickled dense index built by: just build-index
index_path = "indexes/dense_index.pkl"

# Few-shot exemplar index for Gemma, built during training.
exemplar_index_path = "indexes/exemplar_index.pkl"

# SentenceTransformer model for query/passage embedding.
model_name = "BAAI/bge-m3"

# Max passages to retrieve per query before joining and truncating.
top_k = 5

# After joining top-k passages, truncate evidence to this many whitespace tokens
# so the cross-encoder / Gemma context window is not blown by long wiki dumps.
max_evidence_tokens = 512

# Minimum cosine similarity for a passage to be included. Below threshold → [NULL].
similarity_threshold = 0.5

# Retrieval query text:
#   "prompt"          — question only (default; safer for hallucination detection)
#   "prompt_response" — question + answer (experimental; can retrieve false-claim evidence)
query_mode = "prompt"

# Batch size for SentenceTransformer corpus indexing.
batch_size = 32
# Batch size for batched RAG query retrieval during train/predict.
query_batch_size = 32

# Max sequence length for the embedding model to limit GPU memory usage.
max_seq_length = 512

# -----------------------------------------------------------------------------
# XLM-R cross-encoder (defaults; overridden by active hardware_profile)
# -----------------------------------------------------------------------------
[xlmr]
model_name = "FacebookAI/xlm-roberta-large"
max_length = 512
batch_size = 16
num_workers = 2
pin_memory = true
prefetch_factor = 2
persistent_workers = true
grad_accum_steps = 1
use_amp = false
epochs = 20
lr = 2e-4
weight_decay = 0.01
lora_r = 8
lora_alpha = 16
lora_dropout = 0.1
# Focal loss focusing parameter (0 = plain BCE, 2 = standard focal).
focal_gamma = 2.0
# Label smoothing: 0 = hard labels, 0.1 = soft (helps stop overconfident collapse).
label_smoothing = 0.1
early_stopping_patience = 8

# -----------------------------------------------------------------------------
# Gemma verifier — final judge with XLM-R encoder prior in the prompt
# -----------------------------------------------------------------------------
[gemma]
model_name = "google/gemma-4-E4B-it"
load_in = "4bit"                     # "4bit", "8bit", or "none"

# Load placement. Base defaults are for all-GPU 16GB-style loading.
device_map = "cuda:0"
cuda_max_memory = "14GiB"
cpu_max_memory = "32GiB"
offload_folder = "models/offload/gemma"
llm_int8_enable_fp32_cpu_offload = false

# Quant/compute dtype knobs for 4-bit mode.
torch_dtype = "bfloat16"
bnb_4bit_compute_dtype = "bfloat16"
clear_cuda_before_load = true

# Truncate Gemma inputs before they get too large. Null means tokenizer default.
max_input_tokens = 3072

# Use precomputed text embeddings for normal forward passes. This is useful for
# Gemma 4 CPU-offload profiles where direct embedding weight indexing can hit a
# meta tensor.
use_inputs_embeds_for_forward = false
use_language_model_direct = false

# Extra verifier passes. Disable on constrained/offload profiles for stability.
classify_cultural_band = true
enable_think_pass = true

# Dynamic few-shot examples. Lower this to reduce prompt length and avoid loading
# the exemplar embedding model during prediction.
exemplar_top_k = 3

# Think trigger: fast F/H logit pass is uncertain when |p_fast - 0.5| < this value.
confidence_threshold = 0.15

# Think trigger: Gemma fast pass disagrees with XLM-R prior when |p_fast - p_xlmr| > this.
disagree_threshold = 0.25

# Think trigger: C0 band (math/science/universal) + no retrieved evidence → force CoT.
force_think_c0_null = true

# Think trigger: C2 band (recent/time-sensitive) → force CoT.
force_think_c2 = true

# Max tokens for the CoT think pass (parsed verdict: Faithful / Hallucinated).
max_think_tokens = 256

# -----------------------------------------------------------------------------
# Threshold decision — single OOF-tuned cutoff on p_llm (no meta-classifier)
# -----------------------------------------------------------------------------
[blender]
# Metric for grid-searching the decision threshold on OOF Gemma scores:
#   "macro_f1"    — balanced overall F1
#   "f1_class_0"  — optimize hallucinated-class recall/precision (label 0)
threshold_metric = "macro_f1"

# Saved to models/blender_config.pkl (legacy filename; stores threshold only).

# -----------------------------------------------------------------------------
# Hardware profile: RTX 5060 8GB — supported int8 Gemma CPU offload
# -----------------------------------------------------------------------------
[hardware_profiles.8gb.xlmr]
model_name = "FacebookAI/xlm-roberta-base"
max_length = 384
batch_size = 2
num_workers = 2
pin_memory = true
prefetch_factor = 2
persistent_workers = true
grad_accum_steps = 4
use_amp = false
early_stopping_patience = 8

[hardware_profiles.8gb.gemma]
load_in = "8bit"                        # bitsandbytes int8 supports CPU offload; 4bit+auto does not.
llm_int8_enable_fp32_cpu_offload = true
device_map = "auto"
# Keep below total 8GB VRAM so activations, CUDA context, and other allocations
# have headroom. Lower this if Gemma still OOMs during load.
cuda_max_memory = "6GiB"
cpu_max_memory = "48GiB"
max_input_tokens = 1536
use_inputs_embeds_for_forward = true
use_language_model_direct = true
classify_cultural_band = false
enable_think_pass = false
exemplar_top_k = 0
max_think_tokens = 128

[hardware_profiles.8gb.rag]
batch_size = 32
query_batch_size = 32
max_seq_length = 512

# -----------------------------------------------------------------------------
# Hardware profile: RTX 5060 16GB — full pipeline with Gemma
# -----------------------------------------------------------------------------
[hardware_profiles.16gb.xlmr]
model_name = "FacebookAI/xlm-roberta-large"
max_length = 512
batch_size = 4
num_workers = 2
pin_memory = true
prefetch_factor = 2
persistent_workers = true
grad_accum_steps = 4
use_amp = true

[hardware_profiles.16gb.gemma]
load_in = "4bit"
llm_int8_enable_fp32_cpu_offload = false
device_map = "cuda:0"
cuda_max_memory = "14GiB"
max_input_tokens = 3072
use_inputs_embeds_for_forward = false
use_language_model_direct = false
classify_cultural_band = true
enable_think_pass = true
exemplar_top_k = 3
max_think_tokens = 256

[hardware_profiles.16gb.rag]
batch_size = 64
query_batch_size = 64
max_seq_length = 512
